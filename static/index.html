<!DOCTYPE html>
<html lang="en"  class="theme-claude dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Language" content="en">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="en_AU">
    <meta property="og:author" content="scott.sedgwick">
    <link rel="icon" type="image/x-icon" href="assets/appIcon.webp">  
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <title> D&D App </title>
    <!-- Stylesheets -->
    <link href="assets/index.css" rel="stylesheet">
    <link href="assets/styles.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/dark.min.css" />
    <!-- Javascript libraries -->
    <script src="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.11/dist/js/all.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/haskell.min.js"></script>
    <script>
         (() => {
           try {
             const stored = localStorage.getItem('themeMode');
             if (stored ? stored === 'dark'
                        : matchMedia('(prefers-color-scheme: dark)').matches) {
               document.documentElement.classList.add('dark');
             }
           } catch (_) {}
           const apply = dark => {
             document.documentElement.classList.toggle('dark', dark);
             try { localStorage.setItem('themeMode', dark ? 'dark' : 'light'); } catch (_) {}
           };
           document.addEventListener('basecoat:theme', (event) => {
             const mode = event.detail?.mode;
             apply(mode === 'dark' ? true
                  : mode === 'light' ? false
                  : !document.documentElement.classList.contains('dark'));
           });
         })();
    </script>
    <style>
    html, body {
      overflow-x: clip;
    }
  </style>

  </head>
  <body>
    <script src="index.js" type="module"></script>
  </body>
</html>
